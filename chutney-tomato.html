<!DOCTYPE html>
<html lang="en-gb">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width" />
    <link rel="stylesheet" href="food.css" />
    <script src="js/jquery-3.6.0.min.js" type="text/javascript"></script>
    <script src="js/food.js" type="text/javascript"></script>
    <title>Tomato chutney</title>
</head>

<body>
    <div id="main">

        <h1>Tomato chutney</h1>

        <ol>
            <li>Mix
                <ul>
                    <li>200g <em>tomatoes</em> chopped</li>
                    <li>1 clove <em>garlic</em> grated</li>
                    <li>1&frac12; tsp <em>lime juice</em></li>
                    <li>1 tsp <em>vegetable oil</em></li>
                    <li>&frac12; tsp <em>chipotle flakes</em> ground</li>
                    <li>&frac14; tsp <em>salt</em></li>
                </ul>
            </li>
        </ol>

        <h2>Serving</h2>
        <ul>
            <li>2 portions</li>
        </ul>

        <h2>Notes</h2>
        <ul>
            <li><a href="https://www.theguardian.com/food/2026/mar/28/vegetarian-eggs-potato-tomato-chutney-recipe-malabar-hill-meera-sodha"
                    target="_blank">Original recipe</a></li>
        </ul>

    </div>
</body>

</html>
